<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에그 스네이크</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 20px 0;
    background: #fdf8ec;
    font-family: 'Fredoka', -apple-system, sans-serif;
  }
  #esGameBox {
    box-sizing: border-box;
    max-width: 380px;
    margin: 0 auto;
    padding: 14px;
    text-align: center;
    background: linear-gradient(180deg, #fff6da 0%, #f4ecc7 100%);
    border-radius: 20px;
    box-shadow: 0 6px 22px rgba(120,90,40,.15);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  #esGameBox *, #esGameBox *::before, #esGameBox *::after { box-sizing: border-box; }
  #esGameBox .es-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0 0 8px;
    color: #5b7a2f;
  }
  #esGameBox .es-hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #6b5a30;
    font-size: 0.92rem;
    font-weight: 600;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  #esGameBox .es-hud strong { color: #d97b2b; }
  #esGameBox .es-mute, #esGameBox .es-restart {
    border: none;
    background: #e8d7a0;
    color: #5b4a20;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  #esGameBox .es-mute:hover, #esGameBox .es-restart:hover { background: #ddc788; }
  #esGameBox .es-canvas-box {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(90,70,30,.18);
    background: #9ed46b;
  }
  #esGameBox .es-canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  #esGameBox .es-msg {
    margin-top: 8px;
    color: #c0392b;
    font-weight: 600;
    min-height: 22px;
    font-size: 0.95rem;
  }
  #esNameForm {
    display: none;
    margin-top: 8px;
  }
  #esNameForm input {
    padding: 7px 10px;
    width: 140px;
    border-radius: 8px;
    border: 1px solid #cbb677;
    font-family: inherit;
  }
  #esNameForm button {
    padding: 7px 12px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    margin-left: 4px;
    background: #d97b2b;
    color: #fff;
    font-weight: 600;
    font-family: inherit;
  }
  #esGameBox .es-pad {
    display: grid;
    grid-template-columns: repeat(3, 54px);
    grid-template-rows: repeat(3, 54px);
    gap: 6px;
    justify-content: center;
    margin-top: 14px;
  }
  #esGameBox .es-btn {
    width: 54px;
    height: 54px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: #7fae43;
    color: #fff;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 3px 0 #5b8030;
  }
  #esGameBox .es-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #5b8030;
  }
  #esLeaderboardBox {
    margin-top: 14px;
    text-align: left;
    background: rgba(255,255,255,.65);
    border-radius: 10px;
    padding: 10px;
  }
  #esLeaderboardBox .es-lb-title {
    font-weight: 700;
    margin-bottom: 6px;
    color: #5b7a2f;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div id="esGameBox">
  <p class="es-title">🥚 에그 스네이크</p>
  <div class="es-hud">
    <span>점수: <strong class="es-score">0</strong></span>
    <span>
      <button class="es-mute" aria-label="소리 끄기">🔊</button>
      <button class="es-restart">다시 시작</button>
    </span>
  </div>
  <div class="es-canvas-box">
    <canvas class="es-canvas" width="300" height="300" aria-label="에그 스네이크 게임"></canvas>
  </div>
  <div class="es-msg"></div>

  <div id="esNameForm">
    <input id="esNameInput" type="text" maxlength="10" placeholder="닉네임 입력">
    <button id="esSubmitBtn">랭킹 등록</button>
  </div>

  <div class="es-pad">
    <div></div>
    <button class="es-btn" data-dir="up">▲</button>
    <div></div>
    <button class="es-btn" data-dir="left">◀</button>
    <div></div>
    <button class="es-btn" data-dir="right">▶</button>
    <div></div>
    <button class="es-btn" data-dir="down">▼</button>
    <div></div>
  </div>

  <div id="esLeaderboardBox">
    <div class="es-lb-title">🏆 랭킹 TOP 10</div>
    <ol id="esLeaderboard" style="margin:0;padding-left:20px;"></ol>
  </div>
</div>

<script>
(function () {
  var root = document.getElementById("esGameBox");
  if (!root || root.dataset.esReady) return;
  root.dataset.esReady = "1";

  // ▼▼▼ 배포된 웹앱 주소를 넣으세요 (기존 스네이크 게임과 같은 주소, 같은 시트 사용) ▼▼▼
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCIPBDBzaL1EA_3p7QzQ5DHCrN_QdjupgNh31F2c1mLFR_j1Ejptx-YYhMZAvn5-YQVw/exec";
  // GAME_NAME을 지정하지 않아 기존 스네이크 랭킹(첫 번째 시트)에 그대로 이어서 기록됩니다.

  var canvas = root.querySelector(".es-canvas");
  var ctx = canvas.getContext("2d");
  var scoreEl = root.querySelector(".es-score");
  var msgEl = root.querySelector(".es-msg");
  var muteBtn = root.querySelector(".es-mute");
  var restartBtn = root.querySelector(".es-restart");
  var nameForm = document.getElementById("esNameForm");
  var nameInput = document.getElementById("esNameInput");
  var submitBtn = document.getElementById("esSubmitBtn");
  var leaderboardEl = document.getElementById("esLeaderboard");

  // ===================== 사운드 (Web Audio 합성, 목가적인 톤) =====================
  var audio = (function () {
    var ac, bgmGain, sfxGain, unlocked, muted, bgmStep, bgmNext, bgmTimer;
    try { muted = localStorage.getItem("es_mute") === "1"; } catch (e) { muted = false; }
    // 밝고 평화로운 장조 멜로디 (목가적인 느낌)
    var MELODY = [392, 440, 493.88, 440, 392, 349.23, 392, 440, 523.25, 493.88, 440, 392];
    var BEAT = 0.22;

    function init() {
      if (ac) return;
      ac = new (window.AudioContext || window.webkitAudioContext)();
      bgmGain = ac.createGain();
      sfxGain = ac.createGain();
      bgmGain.gain.value = muted ? 0 : 0.1;
      sfxGain.gain.value = muted ? 0 : 0.35;
      bgmGain.connect(ac.destination);
      sfxGain.connect(ac.destination);
    }

    function unlock() {
      init();
      if (unlocked) return;
      unlocked = true;
      if (ac.state === "suspended") ac.resume();
      if (!muted) startBgm();
    }

    function tone(freq, dur, type, dest, start, vol) {
      var t = start || ac.currentTime;
      var o = ac.createOscillator();
      var g = ac.createGain();
      o.type = type || "sine";
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(vol || 0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g);
      g.connect(dest);
      o.start(t);
      o.stop(t + dur + 0.03);
    }

    // 알 먹는 "아삭" 소리: 짧은 노이즈 클릭 + 살짝 상승하는 톤
    function crunch() {
      if (muted || !ac) return;
      var t = ac.currentTime;
      var len = Math.floor(ac.sampleRate * 0.06);
      var buf = ac.createBuffer(1, len, ac.sampleRate);
      var d = buf.getChannelData(0);
      for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
      var src = ac.createBufferSource();
      src.buffer = buf;
      var filt = ac.createBiquadFilter();
      filt.type = "bandpass"; filt.frequency.value = 1800;
      var g = ac.createGain();
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      src.connect(filt); filt.connect(g); g.connect(sfxGain);
      src.start(t);
      tone(740, 0.09, "sine", sfxGain, t + 0.01, 0.18);
    }

    function gameOver() {
      if (muted || !ac) return;
      stopBgm();
      var t = ac.currentTime;
      tone(392, 0.16, "triangle", sfxGain, t, 0.22);
      tone(329.63, 0.16, "triangle", sfxGain, t + 0.15, 0.2);
      tone(261.63, 0.28, "triangle", sfxGain, t + 0.3, 0.2);
    }

    function tickBgm() {
      if (!unlocked || muted || !ac) return;
      var now = ac.currentTime;
      while (bgmNext < now + 0.12) {
        var f = MELODY[bgmStep % MELODY.length];
        tone(f, BEAT * 0.8, "triangle", bgmGain, bgmNext, 0.13);
        tone(f * 2, BEAT * 0.5, "sine", bgmGain, bgmNext, 0.03);
        bgmStep++;
        bgmNext += BEAT;
      }
    }

    function startBgm() {
      if (!ac || muted) return;
      bgmStep = 0;
      bgmNext = ac.currentTime + 0.04;
      if (!bgmTimer) bgmTimer = setInterval(tickBgm, 45);
    }

    function stopBgm() {
      if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
    }

    function setMuted(m) {
      muted = m;
      if (bgmGain) bgmGain.gain.value = muted ? 0 : 0.1;
      if (sfxGain) sfxGain.gain.value = muted ? 0 : 0.35;
      try { localStorage.setItem("es_mute", muted ? "1" : "0"); } catch (e) {}
      if (muted) stopBgm();
      else if (unlocked) startBgm();
      if (muteBtn) {
        muteBtn.textContent = muted ? "🔇" : "🔊";
        muteBtn.setAttribute("aria-label", muted ? "소리 켜기" : "소리 끄기");
      }
    }

    setMuted(muted);
    return {
      unlock: unlock, crunch: crunch, gameOver: gameOver,
      resumeBgm: function () { if (!muted && unlocked) startBgm(); },
      toggleMute: function () { setMuted(!muted); }
    };
  })();

  muteBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    audio.toggleMute();
  });

  // ===================== 게임 로직 =====================
  var gridSize = 15;
  var cellSize = canvas.width / gridSize;
  var snake, direction, nextDirection, food, score, gameOver, tickTimer, grassTufts, particles;

  function randomFood(){
    var pos;
    do{
      pos = { x: Math.floor(Math.random()*gridSize), y: Math.floor(Math.random()*gridSize) };
    } while(snake.some(function(s){ return s.x===pos.x && s.y===pos.y; }));
    return pos;
  }

  function initGrass(){
    grassTufts = [];
    for (var i = 0; i < 40; i++){
      grassTufts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: 3 + Math.random() * 4,
        a: 0.08 + Math.random() * 0.1
      });
    }
  }

  function init(){
    snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    gameOver = false;
    particles = [];
    food = randomFood();
    scoreEl.textContent = score;
    msgEl.textContent = '';
    nameForm.style.display = 'none';
    initGrass();
    if(tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(tick, 120);
    draw();
  }

  function spawnParticles(gx, gy){
    var cx = gx*cellSize + cellSize/2;
    var cy = gy*cellSize + cellSize/2;
    for (var i=0;i<10;i++){
      var ang = Math.random()*Math.PI*2;
      var spd = 1 + Math.random()*2.2;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
        life: 18 + Math.random()*10, maxLife: 28,
        color: Math.random() < 0.5 ? '255,235,180' : '255,255,255'
      });
    }
  }

  function tick(){
    if(gameOver) return;
    direction = nextDirection;
    var head = {x: snake[0].x, y: snake[0].y};
    if(direction==='up') head.y -= 1;
    else if(direction==='down') head.y += 1;
    else if(direction==='left') head.x -= 1;
    else if(direction==='right') head.x += 1;

    if(head.x<0 || head.x>=gridSize || head.y<0 || head.y>=gridSize ||
       snake.some(function(s){ return s.x===head.x && s.y===head.y; })){
      endGame();
      return;
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
      score += 10;
      scoreEl.textContent = score;
      audio.unlock();
      audio.crunch();
      spawnParticles(food.x, food.y);
      food = randomFood();
    } else {
      snake.pop();
    }

    for (var i = particles.length-1; i>=0; i--){
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life<=0) particles.splice(i,1);
    }

    draw();
  }

  function endGame(){
    gameOver = true;
    clearInterval(tickTimer);
    audio.gameOver();
    msgEl.textContent = '게임 오버! 점수: ' + score;
    if(score > 0){
      nameForm.style.display = 'block';
    }
  }

  function drawGrassBackground(){
    var g = ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0, '#a8dd6e');
    g.addColorStop(1, '#8ec456');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 1;
    for (var gx=0; gx<=gridSize; gx++){
      ctx.beginPath();
      ctx.moveTo(gx*cellSize, 0);
      ctx.lineTo(gx*cellSize, canvas.height);
      ctx.stroke();
    }
    for (var gy=0; gy<=gridSize; gy++){
      ctx.beginPath();
      ctx.moveTo(0, gy*cellSize);
      ctx.lineTo(canvas.width, gy*cellSize);
      ctx.stroke();
    }

    grassTufts.forEach(function(t){
      ctx.strokeStyle = 'rgba(70,120,40,' + t.a + ')';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(t.x, t.y);
      ctx.lineTo(t.x - t.s*0.3, t.y - t.s);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(t.x, t.y);
      ctx.lineTo(t.x + t.s*0.3, t.y - t.s);
      ctx.stroke();
    });
  }

  function drawEgg(){
    var cx = food.x*cellSize + cellSize/2;
    var cy = food.y*cellSize + cellSize/2;
    var rx = cellSize*0.32, ry = cellSize*0.4;

    ctx.save();
    ctx.shadowColor = 'rgba(255,240,180,.7)';
    ctx.shadowBlur = 8;
    var grad = ctx.createRadialGradient(cx-3, cy-4, 1, cx, cy, ry*1.3);
    grad.addColorStop(0, '#fffef2');
    grad.addColorStop(1, '#f4e3b0');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy+1, rx, ry, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = 'rgba(190,150,80,.35)';
    for (var i=0;i<3;i++){
      var sx = cx + (Math.random()-0.5)*rx*1.1;
      var sy = cy + (Math.random()-0.5)*ry*1.1;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawSnake(){
    for (var i = snake.length-1; i>=0; i--){
      var s = snake[i];
      var cx = s.x*cellSize + cellSize/2;
      var cy = s.y*cellSize + cellSize/2;
      var r = cellSize/2 - 1;

      var grad = ctx.createRadialGradient(cx-2, cy-2, 1, cx, cy, r);
      if (i === 0){
        grad.addColorStop(0, '#ffe27a');
        grad.addColorStop(1, '#e8a93a');
      } else {
        grad.addColorStop(0, '#5fae3d');
        grad.addColorStop(1, '#3f8226');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(s.x*cellSize+1, s.y*cellSize+1, cellSize-2, cellSize-2, 6) :
        ctx.rect(s.x*cellSize+1, s.y*cellSize+1, cellSize-2, cellSize-2);
      ctx.fill();

      if (i === 0){
        // 눈
        var eyeOffX = direction==='left' ? -3 : direction==='right' ? 3 : 0;
        var eyeOffY = direction==='up' ? -3 : direction==='down' ? 3 : 0;
        ctx.fillStyle = '#2b2b2b';
        ctx.beginPath();
        ctx.arc(cx + eyeOffX - (eyeOffY!==0?4:0), cy + eyeOffY - (eyeOffX!==0?4:0), 1.6, 0, Math.PI*2);
        ctx.arc(cx + eyeOffX + (eyeOffY!==0?4:0), cy + eyeOffY + (eyeOffX!==0?4:0), 1.6, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawParticles(){
    particles.forEach(function(p){
      var a = p.life/p.maxLife;
      ctx.fillStyle = 'rgba(' + p.color + ',' + (a*0.9).toFixed(2) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2*a+0.5, 0, Math.PI*2);
      ctx.fill();
    });
  }

  function draw(){
    drawGrassBackground();
    drawEgg();
    drawSnake();
    drawParticles();
  }

  function changeDirection(dir){
    var opposite = {up:'down', down:'up', left:'right', right:'left'};
    if(dir === opposite[direction]) return;
    nextDirection = dir;
  }

  document.addEventListener('keydown', function(e){
    var map = {ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right'};
    if(map[e.key]){
      e.preventDefault();
      audio.unlock();
      changeDirection(map[e.key]);
    }
  }, {passive:false});

  root.querySelectorAll('.es-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      audio.unlock();
      changeDirection(btn.getAttribute('data-dir'));
    });
    btn.addEventListener('touchstart', function(e){
      e.preventDefault();
      audio.unlock();
      changeDirection(btn.getAttribute('data-dir'));
    }, {passive:false});
  });

  restartBtn.addEventListener('click', function(){
    audio.unlock();
    audio.resumeBgm();
    init();
  });

  init();

  // ===================== 구글 시트 랭킹 연동 (기존 스네이크 시트에 그대로 이어짐) =====================
  submitBtn.addEventListener('click', function () {
    var name = nameInput.value.trim();
    if (!name) { alert('닉네임을 입력해주세요.'); return; }
    submitBtn.disabled = true;
    submitBtn.textContent = '등록 중...';
    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ name: name, score: score })
    })
    .catch(function (err) { console.error('등록 요청 에러:', err); })
    .finally(function () {
      nameForm.style.display = 'none';
      submitBtn.disabled = false;
      submitBtn.textContent = '랭킹 등록';
      setTimeout(function () { loadLeaderboard(true); }, 800);
    });
  });

  var MIN_INTERVAL_MS = 15000;
  var lastFetchTime = 0;

  function renderLeaderboard(list) {
    leaderboardEl.innerHTML = '';
    if (!list || list.length === 0) {
      leaderboardEl.innerHTML = '<li>아직 기록이 없습니다.</li>';
      return;
    }
    list.forEach(function (item) {
      var li = document.createElement('li');
      li.textContent = item.name + ' - ' + item.score + '점';
      leaderboardEl.appendChild(li);
    });
  }

  function loadLeaderboard(force) {
    if (!SCRIPT_URL || SCRIPT_URL.indexOf('여기에') === 0) {
      leaderboardEl.innerHTML = '<li>랭킹 기능 설정 전입니다.</li>';
      return;
    }
    var now = Date.now();
    if (!force && (now - lastFetchTime) < MIN_INTERVAL_MS) return;
    fetch(SCRIPT_URL)
      .then(function (res) {
        if (res.status === 429) throw new Error('요청 한도 초과(429)');
        return res.json();
      })
      .then(function (list) {
        lastFetchTime = Date.now();
        try { sessionStorage.setItem('esLeaderboardCache', JSON.stringify(list)); } catch (e) {}
        renderLeaderboard(list);
      })
      .catch(function (err) {
        console.error('랭킹 조회 실패:', err);
        var cached = null;
        try { cached = JSON.parse(sessionStorage.getItem('esLeaderboardCache')); } catch (e) {}
        if (cached) renderLeaderboard(cached);
        else leaderboardEl.innerHTML = '<li>랭킹을 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</li>';
      });
  }

  loadLeaderboard();
})();
</script>

<script>
// iframe 자동 높이 조절: 부모 페이지(티스토리)에 실제 콘텐츠 높이를 계속 전달
(function(){
  function sendHeight(){
    var h = document.body.scrollHeight;
    try{ parent.postMessage({ gameFrameHeight: h }, '*'); }catch(e){}
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
  setInterval(sendHeight, 800);
})();
</script>

</body>
</html>
